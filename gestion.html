<main class="pt-44 pb-20 max-w-5xl mx-auto px-6">
    <div class="flex flex-col md:flex-row gap-12">
        <aside class="w-full md:w-64 space-y-2">
            <button onclick="switchTab('publicaciones')" id="tab-pub-btn" class="sidebar-link active w-full flex items-center gap-3 p-4 rounded-2xl font-bold text-sm bg-primary text-white">
                <span class="material-symbols-outlined">article</span> Publicaciones
            </button>
            <button onclick="switchTab('tutorias')" id="tab-tut-btn" class="sidebar-link w-full flex items-center gap-3 p-4 rounded-2xl font-bold text-sm text-on-surface-variant hover:bg-emerald-900/5">
                <span class="material-symbols-outlined">assignment</span> Tutorías
            </button>
        </aside>

        <div class="flex-grow">
            <div id="view-publicaciones" class="tab-content active">
                <h1 class="text-4xl font-black text-primary mb-6 uppercase tracking-tighter italic">Nueva Publicación</h1>
                <form onsubmit="enviarDatos(event, 'Publicaciones')" class="bg-white p-8 rounded-[2.5rem] border border-emerald-900/10 shadow-sm space-y-6">
                    <button type="submit" class="w-full bg-primary text-white py-4 rounded-full font-black uppercase text-xs">Publicar Artículo</button>
                </form>
            </div>

            <div id="view-tutorias" class="tab-content hidden">
                <h1 class="text-4xl font-black text-primary mb-6 uppercase tracking-tighter italic">Nueva Tutoría</h1>
                <form onsubmit="enviarDatos(event, 'Tutorias')" class="bg-white p-8 rounded-[2.5rem] border border-emerald-900/10 shadow-sm space-y-6">
                    <input type="text" name="titulo" placeholder="Título de la Tesis" class="w-full bg-slate-50 border-none rounded-xl p-4">
                    <div class="grid grid-cols-2 gap-4">
                        <select name="tutor" class="w-full bg-slate-50 border-none rounded-xl p-4">
                            <option>Dra. Adriana Delfraro</option>
                            <option>Dra. Sandra Frabasile</option>
                            </select>
                        <select name="cotutor" class="w-full bg-slate-50 border-none rounded-xl p-4">
                            <option value="">Sin Cotutor</option>
                            <option>Dra. Natalia Ramos</option>
                            </select>
                    </div>
                    <input type="text" name="estudiante" placeholder="Nombre del Estudiante" class="w-full bg-slate-50 border-none rounded-xl p-4">
                    <select name="nivel" class="w-full bg-slate-50 border-none rounded-xl p-4">
                        <option>Grado</option>
                        <option>Maestría (PEDECIBA)</option>
                        <option>Doctorado (PEDECIBA)</option>
                    </select>
                    <button type="submit" class="w-full bg-primary text-white py-4 rounded-full font-black uppercase text-xs">Registrar Tutoría</button>
                </form>
            </div>
        </div>
    </div>
</main>
