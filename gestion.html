<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Acceso Restringido | Sección Virología</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            "colors": {
                    "primary": "#0d631b",
                    "surface": "#f6faf6",
                    "on-surface-variant": "#40493d",
            }
          }
        }
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-header { background: rgba(246, 250, 246, 0.7); backdrop-filter: blur(20px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .sidebar-link.active { background: #0d631b; color: white; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body">

    <div id="login-container" class="fixed inset-0 z-[100] bg-emerald-900 flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-md w-full text-center">
            <img class="h-16 mx-auto mb-6" src="https://raw.githubusercontent.com/s-cuevas/SeccionVirologiafcien/main/a1115b78-16f1-444c-912f-ca878fb95f46.jfif" alt="Logo">
            <h2 class="text-2xl font-black text-primary mb-2 uppercase tracking-tighter text-balance">Administración Interna</h2>
            <p class="text-sm text-on-surface-variant mb-8 italic">Sección Virología</p>
            
            <div class="space-y-4">
                <input type="text" id="user-field" placeholder="Usuario" class="w-full bg-surface border-none rounded-2xl p-4 focus:ring-2 focus:ring-primary outline-none text-center font-bold">
                <input type="password" id="pass-field" placeholder="Contraseña" class="w-full bg-surface border-none rounded-2xl p-4 focus:ring-2 focus:ring-primary outline-none text-center font-bold">
                <button onclick="attemptLogin()" class="w-full bg-primary text-white py-4 rounded-full font-black uppercase text-xs tracking-widest shadow-lg hover:opacity-90 transition-all active:scale-95">
                    Verificar Identidad
                </button>
            </div>
            <p id="auth-error" class="text-red-600 text-xs font-bold mt-4 hidden">Credenciales inválidas.</p>
            <a href="index.html" class="block mt-6 text-[10px] uppercase font-black text-primary/40 hover:text-primary transition-colors tracking-widest">Volver a la web pública</a>
        </div>
    </div>

    <div id="main-content"></div>

    <template id="admin-template">
        <nav class="fixed top-0 w-full z-50 glass-header shadow-sm h-28 flex items-center">
            <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
                <a href="index.html" class="flex-shrink-0">
                    <img alt="Virología Logo" class="h-20 w-auto object-contain" src="https://raw.githubusercontent.com/s-cuevas/SeccionVirologiafcien/main/a1115b78-16f1-444c-912f-ca878fb95f46.jfif"/>
                </a>
                <button onclick="processLogout()" class="px-6 py-2 rounded-xl bg-primary text-on-primary font-headline text-sm font-semibold uppercase tracking-wider hover:opacity-90 transition-all">Cerrar Sesión</button>
            </div>
        </nav>

        <main class="pt-44 pb-20 max-w-7xl mx-auto px-6">
            <div class="flex flex-col md:flex-row gap-12">
                <aside class="w-full md:w-64">
                    <div class="p-6 bg-white rounded-3xl border border-emerald-900/5 shadow-sm sticky top-44">
                        <p class="text-[10px] font-black uppercase tracking-widest text-primary mb-4 text-center">Panel Docente</p>
                        <nav class="space-y-1">
                            <button onclick="switchTab('tutorias')" id="tab-tutorias-btn" class="sidebar-link active w-full flex items-center gap-3 p-3 rounded-xl font-bold text-sm transition-all text-left">
                                <span class="material-symbols-outlined text-sm">assignment</span> Tutorías
                            </button>
                            <button onclick="switchTab('publicaciones')" id="tab-publicaciones-btn" class="sidebar-link w-full flex items-center gap-3 p-3 rounded-xl font-bold text-sm text-on-surface-variant hover:bg-emerald-900/5 transition-all text-left">
                                <span class="material-symbols-outlined text-sm">article</span> Publicaciones
                            </button>
                        </nav>
                    </div>
                </aside>

                <div class="flex-grow">
                    <div id="view-tutorias" class="tab-content active space-y-8">
                        <h1 class="text-4xl font-black font-headline tracking-tighter text-primary">Gestión de Tutorías</h1>
                        <div class="bg-white p-10 rounded-[3rem] border border-emerald-900/10 shadow-sm">
                            <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="md:col-span-2">
                                    <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2">Título de la Tesis / Proyecto</label>
                                    <input type="text" class="w-full bg-surface border-none rounded-xl p-4">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2">Tutor/a Responsable</label>
                                    <select class="w-full bg-surface border-none rounded-xl p-4">
                                        <option>Dra. Adriana Delfraro</option>
                                        <option>Dra. Sandra Frabasile</option>
                                        <option>Dra. Mabel Berois</option>
                                        <option>Dra. Natalia Ramos</option>
                                        <option>Dr. Germán Botto</option>
                                        <option>MSc. Lucía Moreira</option>
                                        <option>Lic. María Belén Bargas</option>
                                        <option>Lic. Santiago Cuevas</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2">Cotutor/a</label>
                                    <select class="w-full bg-surface border-none rounded-xl p-4 text-sm">
                                        <option value="">Sin Cotutor</option>
                                        <option>Dra. Adriana Delfraro</option>
                                        <option>Dra. Sandra Frabasile</option>
                                        <option>Dra. Mabel Berois</option>
                                        <option>Dra. Natalia Ramos</option>
                                        <option>Dr. Germán Botto</option>
                                        <option>MSc. Lucía Moreira</option>
                                        <option>Lic. María Belén Bargas</option>
                                        <option>Lic. Santiago Cuevas</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2">Nivel Académico</label>
                                    <select class="w-full bg-surface border-none rounded-xl p-4">
                                        <option>Grado</option>
                                        <option>Maestría (PEDECIBA)</option>
                                        <option>Maestría (Biotecnología)</option>
                                        <option>Doctorado (PEDECIBA)</option>
                                        <option>Doctorado (Biotecnología)</option>
                                        <option>Pasantía de Investigación</option>
                                    </select>
                                </div>
                                <div class="md:col-span-2 flex justify-end">
                                    <button type="submit" class="bg-primary text-white px-12 py-4 rounded-full font-black uppercase text-xs tracking-widest shadow-lg hover:opacity-90 transition-all">Publicar Registro</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div id="view-publicaciones" class="tab-content space-y-8">
                        <h1 class="text-4xl font-black font-headline tracking-tighter text-primary">Gestión de Publicaciones</h1>
                        <div class="bg-white p-10 rounded-[3rem] border border-emerald-900/10 shadow-sm">
                            <form class="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
                                <div class="md:col-span-2">
                                    <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2 text-xs">Autores</label>
                                    <input type="text" placeholder="Delfraro A, Botto G..." class="w-full bg-surface border-none rounded-xl p-4">
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2 text-xs">Título del Trabajo</label>
                                    <input type="text" class="w-full bg-surface border-none rounded-xl p-4">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2 text-xs">Revista / DOI</label>
                                    <input type="text" class="w-full bg-surface border-none rounded-xl p-4">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2 text-xs">Año</label>
                                    <input type="number" value="2026" class="w-full bg-surface border-none rounded-xl p-4">
                                </div>
                                <div class="md:col-span-2 flex justify-end">
                                    <button type="submit" class="bg-primary text-white px-12 py-4 rounded-full font-black uppercase text-xs tracking-widest shadow-lg hover:opacity-90 transition-all">Agregar al Catálogo</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </template>

    <script>
        const AUTH = { user: "virologia", pass: "fcien2026" };

        // Al iniciar, revisamos si ya está logueado
        window.onload = () => {
            if (sessionStorage.getItem('fcien_auth') === 'active') {
                renderDashboard();
            }
        };

        function attemptLogin() {
            const u = document.getElementById('user-field').value;
            const p = document.getElementById('pass-field').value;
            const err = document.getElementById('auth-error');

            if (u === AUTH.user && p === AUTH.pass) {
                sessionStorage.setItem('fcien_auth', 'active');
                renderDashboard();
            } else {
                err.classList.remove('hidden');
                document.getElementById('pass-field').value = "";
            }
        }

        function renderDashboard() {
            const template = document.getElementById('admin-template');
            const clone = template.content.cloneNode(true);
            
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('main-content').appendChild(clone);
        }

        function processLogout() {
            sessionStorage.clear();
            window.location.reload();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(b => b.classList.remove('active'));
            
            document.getElementById('view-' + tabId).classList.add('active');
            document.getElementById('tab-' + tabId + '-btn').classList.add('active');
        }
    </script>
</body>
</html>
