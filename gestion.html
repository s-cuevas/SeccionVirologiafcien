<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gestión Interna | Sección Virología</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d631b",
                        "surface": "#f6faf6",
                        "on-surface-variant": "#40493d",
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-header { background: rgba(246, 250, 246, 0.7); backdrop-filter: blur(20px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .sidebar-link.active { background: #0d631b; color: white; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body">

    <nav class="fixed top-0 w-full z-50 glass-header shadow-sm h-28 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <a href="index.html" class="flex-shrink-0">
                <img alt="Virología Logo" class="h-20 w-auto object-contain" src="https://raw.githubusercontent.com/s-cuevas/SeccionVirologiafcien/main/a1115b78-16f1-444c-912f-ca878fb95f46.jfif"/>
            </a>
            <div class="flex items-center gap-4">
                <a href="index.html" class="px-5 py-2 rounded-xl bg-primary text-on-primary font-headline text-sm font-semibold uppercase tracking-wider hover:opacity-90 transition-all text-center">Salir</a>
            </div>
        </div>
    </nav>

    <main class="pt-44 pb-20 max-w-7xl mx-auto px-6">
        <div class="flex flex-col md:flex-row gap-12">
            
            <aside class="w-full md:w-64 space-y-2">
                <div class="p-6 bg-white rounded-3xl border border-emerald-900/5 shadow-sm">
                    <p class="text-[10px] font-black uppercase tracking-widest text-primary mb-4">Administración</p>
                    <nav class="space-y-1">
                        <button onclick="showSection('tutorias')" id="btn-tutorias" class="sidebar-link active w-full flex items-center gap-3 p-3 rounded-xl font-bold text-sm transition-all">
                            <span class="material-symbols-outlined">assignment</span> Tutorías
                        </button>
                        <button onclick="showSection('publicaciones')" id="btn-publicaciones" class="sidebar-link w-full flex items-center gap-3 p-3 rounded-xl font-bold text-sm text-on-surface-variant hover:bg-emerald-900/5 transition-all">
                            <span class="material-symbols-outlined">article</span> Publicaciones
                        </button>
                    </nav>
                </div>
            </aside>

            <div class="flex-grow">
                
                <div id="section-tutorias" class="tab-content active space-y-8">
                    <header>
                        <h1 class="text-4xl font-black font-headline tracking-tighter text-primary">Gestión de Tutorías</h1>
                        <p class="text-on-surface-variant mt-2 italic text-sm">Registro de tesis de grado, maestría y doctorado[cite: 382].</p>
                    </header>

                    <section class="bg-white p-8 rounded-[2.5rem] border border-emerald-900/10 shadow-sm">
                        <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="md:col-span-2">
                                <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2">Título de la Tesis / Proyecto</label>
                                <input type="text" class="w-full bg-surface border-none rounded-xl p-4 focus:ring-2 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2">Tutor/a Responsable</label>
                                <select class="w-full bg-surface border-none rounded-xl p-4 focus:ring-2 focus:ring-primary">
                                    <option>Adriana Delfraro [cite: 12]</option>
                                    <option>Mabel Berois [cite: 368]</option>
                                    <option>Sandra Frabasile [cite: 478]</option>
                                    <option>Natalia Ramos [cite: 15]</option>
                                    <option>Santiago Mirazo [cite: 416]</option>
                                    <option>Natalia Olivero [cite: 369]</option>
                                    <option>Germán Botto [cite: 186]</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2">Cotutor/a (Opcional)</label>
                                <select class="w-full bg-surface border-none rounded-xl p-4 focus:ring-2 focus:ring-primary">
                                    <option value="">Ninguno</option>
                                    <option>Natalia Ramos [cite: 15]</option>
                                    <option>Sandra Frabasile [cite: 478]</option>
                                    <option>Andrés Pizzorno [cite: 419]</option>
                                    <option>Lucía Moreira [cite: 486]</option>
                                    <option>Santiago Cuevas [cite: 487]</option>
                                </select>
                            </div>
                            <div class="md:col-span-2 flex justify-end">
                                <button type="submit" class="bg-primary text-white px-10 py-3 rounded-full font-black uppercase text-xs tracking-widest shadow-lg hover:opacity-90 transition-all">Guardar Tutoría</button>
                            </div>
                        </form>
                    </section>
                </div>

                <div id="section-publicaciones" class="tab-content space-y-8">
                    <header>
                        <h1 class="text-4xl font-black font-headline tracking-tighter text-primary">Gestión de Publicaciones</h1>
                        <p class="text-on-surface-variant mt-2 italic text-sm">Actualizar el catálogo de artículos arbitrados y libros.</p>
                    </header>

                    <section class="bg-white p-8 rounded-[2.5rem] border border-emerald-900/10 shadow-sm">
                        <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="md:col-span-2">
                                <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2">Título del Artículo</label>
                                <input type="text" placeholder="Ej: SARS-CoV-2 genomic characterization..." class="w-full bg-surface border-none rounded-xl p-4 focus:ring-2 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2">Revista / Editorial</label>
                                <input type="text" placeholder="Ej: Journal of Virology" class="w-full bg-surface border-none rounded-xl p-4 focus:ring-2 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2">DOI (Enlace)</label>
                                <input type="text" placeholder="https://doi.org/..." class="w-full bg-surface border-none rounded-xl p-4 focus:ring-2 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-primary mb-2">Año de Publicación</label>
                                <input type="number" value="2026" class="w-full bg-surface border-none rounded-xl p-4 focus:ring-2 focus:ring-primary">
                            </div>
                            <div class="md:col-span-2 flex justify-end">
                                <button type="submit" class="bg-primary text-white px-10 py-3 rounded-full font-black uppercase text-xs tracking-widest shadow-lg hover:opacity-90 transition-all">Agregar Publicación</button>
                            </div>
                        </form>
                    </section>
                </div>

            </div>
        </div>
    </main>

    <script>
        function showSection(sectionId) {
            // Ocultar todas las secciones
            document.querySelectorAll('.tab-content').forEach(section => {
                section.classList.remove('active');
            });
            // Quitar clase active de los botones
            document.querySelectorAll('.sidebar-link').forEach(btn => {
                btn.classList.remove('active');
            });
            // Mostrar la sección seleccionada y activar botón
            document.getElementById('section-' + sectionId).classList.add('active');
            document.getElementById('btn-' + sectionId).classList.add('active');
        }
    </script>
</body>
</html>
