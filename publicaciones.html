<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Publicaciones | Sección Virología</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet"/>
    <style>
        .glass-header { background: rgba(246, 250, 246, 0.8); backdrop-filter: blur(20px); }
        .pub-card { transition: all 0.3s ease; border-left: 0px solid #0d631b; }
        .pub-card:hover { transform: translateX(10px); border-left-width: 8px; }
    </style>
</head>
<body class="bg-[#f6faf6] font-body text-slate-800">

    <nav class="fixed top-0 w-full z-50 glass-header shadow-sm h-28 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <a href="index.html"><img class="h-20" src="https://raw.githubusercontent.com/s-cuevas/SeccionVirologiafcien/main/a1115b78-16f1-444c-912f-ca878fb95f46.jfif"></a>
            <div class="flex gap-8 uppercase font-bold text-xs tracking-widest">
                <a href="index.html" class="hover:text-emerald-800">Inicio</a>
                <a href="publicaciones.html" class="text-emerald-700 underline decoration-2 underline-offset-8">Publicaciones</a>
            </div>
        </div>
    </nav>

    <main class="pt-44 pb-20 max-w-5xl mx-auto px-6">
        <h1 class="text-6xl font-black text-emerald-900 mb-2 tracking-tighter uppercase italic">Publicaciones</h1>
        <p class="text-xl text-emerald-800/40 font-bold mb-16 uppercase tracking-widest">Catálogo Científico</p>

        <div id="lista-publicaciones" class="space-y-6">
            <div class="animate-pulse text-emerald-800 font-bold italic">Consultando base de datos de la virosfera...</div>
        </div>
    </main>

    <script>
        const SHEET_ID = '1TBEC54I_bJrKx2P99M-0ghOMDAl1DizcElm1_NB947E';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        fetch(URL)
            .then(res => res.text())
            .then(data => {
                const json = JSON.parse(data.substr(47).slice(0, -2));
                const rows = json.table.rows;
                const container = document.getElementById('lista-publicaciones');
                container.innerHTML = '';

                // Mostramos las filas (saltamos la primera si es el encabezado)
                rows.slice(1).reverse().forEach(row => {
                    const autores = row.c[0]?.v || '';
                    const titulo = row.c[1]?.v || '';
                    const revista = row.c[2]?.v || '';
                    const anio = row.c[3]?.v || '';
                    const enlace = row.c[4]?.v || '#';

                    container.innerHTML += `
                        <div class="pub-card bg-white p-10 rounded-[2.5rem] shadow-sm border border-emerald-900/5">
                            <p class="text-emerald-700 font-black text-[10px] uppercase tracking-[0.2em] mb-3">${autores}</p>
                            <h3 class="text-2xl font-black text-slate-900 leading-tight mb-4">${titulo}</h3>
                            <div class="flex justify-between items-end">
                                <p class="text-slate-400 italic text-sm font-medium">${revista} — ${anio}</p>
                                <a href="${enlace}" target="_blank" class="bg-emerald-900 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:opacity-80 transition-all">DOI / Link</a>
                            </div>
                        </div>
                    `;
                });
            })
            .catch(() => {
                document.getElementById('lista-publicaciones').innerHTML = "Error al conectar con la base de datos.";
            });
    </script>
</body>
</html>
